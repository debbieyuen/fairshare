<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    // Camera (getUserMedia) requires a secure context — redirect HTTP → HTTPS
    if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        location.replace('https://' + location.host + location.pathname + location.search + location.hash);
    }
    </script>
    <title>Union</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3a7ca5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Union">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <img id="headerAvatar" class="header-avatar hidden" src="" alt="Your profile photo" onclick="openPreferences()" title="Profile &amp; preferences">
    <span id="versionFloater" class="version-floater hidden">__BUILD_VERSION__</span>
    <span class="user-name" id="userDisplay" onclick="openPreferences()" title="Profile &amp; preferences"></span>
    <div class="header-right">
        <button type="button" class="header-icon-btn" onclick="openContactListScreen()" title="Contacts" aria-label="Contacts">👥</button>
        <button type="button" class="header-icon-btn header-heart-btn" onclick="openHeartDialog()" title="Love &amp; Trust" aria-label="Love and Trust">❤️</button>
        <button type="button" class="header-icon-btn" onclick="openMeetScreen()" title="Exchange contacts (show QR)" aria-label="Exchange contacts">🤝</button>
    </div>
</div>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="auth-container">
    <h2>Union</h2>

    <!-- Invite banner (shown when arriving via invite link) -->
    <div id="inviteBanner" class="hidden" style="background:linear-gradient(135deg,#e3f0f8,#d4e8f5);border-radius:8px;padding:1rem;margin-bottom:1.5rem;border-left:4px solid var(--primary-color);">
        <div id="inviteBannerText" style="font-size:0.9rem;color:var(--accent-color);line-height:1.5;"></div>
    </div>

    <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Log In</div>
        <div class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Sign Up</div>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required placeholder="Your password" minlength="6">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Log In</button>
        </div>
    </form>

    <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
        <div id="signupGate" class="hidden" style="text-align:center;padding:1.5rem 0;color:var(--dark-gray);">
            <p style="font-size:0.95rem;margin-bottom:0.5rem;">You need an invitation link to create an account.</p>
            <p style="font-size:0.85rem;">Ask an existing member to sponsor you.</p>
        </div>
        <div id="signupFields">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="signupName" required placeholder="How others will see you" minlength="2">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" required placeholder="At least 6 characters" minlength="6">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-success">Create Account</button>
            </div>
        </div>
    </form>
</div>

<!-- ===== APP (hidden until logged in) ===== -->
<div id="appScreen" class="hidden">
    <div class="main-content">

        <!-- My Groups screen (full-page list) -->
        <div id="groupsScreen">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h2 style="color:var(--accent-color);">My Groups</h2>
                <button class="btn btn-primary" onclick="showModal('createGroup')">+ Create Group</button>
            </div>
            <div id="groupList">
                <!-- Populated dynamically -->
            </div>
            <p id="groupsEmptyHint" class="hidden" style="text-align:center;color:var(--dark-gray);margin-top:2rem;">
                Create a new group to get started, or ask an existing member to sponsor you.
            </p>
        </div>

        <!-- Group view (hidden until group selected) -->
        <div id="groupView" class="hidden">
            <!-- Group name header — click to go back to groups list -->
            <div class="card balance-card group-name-link" onclick="showGroupsList()" style="display:flex;align-items:center;">
                <div class="group-header-center">
                    <div class="group-avatar-wrap group-header-avatar-wrap" onclick="onGroupLogoClick(event)" title="Click to change group logo">
                        <div id="groupAvatarImg" class="group-avatar-placeholder" aria-label="Group logo">👥</div>
                    </div>
                    <div class="balance-amount" id="groupNameDisplay"></div>
                </div>
            </div>
            <input type="file" id="groupLogoInput" accept="image/*" class="hidden">

            <!-- Tab bar -->
            <div class="tab-bar" id="tabBar">
                <button class="tab-btn active" data-tab="money" onclick="switchTab('money')">
                    <span class="tab-icon">💲</span><span class="tab-label"> Money</span>
                </button>
                <button class="tab-btn" data-tab="members" onclick="switchTab('members')">
                    <span class="tab-icon">👥</span><span class="tab-label"> Members</span>
                </button>
                <button class="tab-btn" data-tab="constitution" onclick="switchTab('constitution')">
                    <span class="tab-icon">📄</span><span class="tab-label"> Docs</span>
                </button>
                <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">
                    <span class="tab-icon">💬</span><span class="tab-label"> Chat</span>
                </button>
            </div>

            <!-- Tab content -->
            <div class="tab-content-card" id="tabContent">
                <!-- Populated dynamically per active tab -->
            </div>

            <!-- Activity log (always visible below tabs) -->
            <div class="card" id="activityLog">
                <h3>Activity</h3>
                <div id="activityContent">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Full-screen flash for successful handshake -->
<div id="handshakeFlash" class="handshake-flash"></div>

<!-- ===== MEET / QR CONTACT EXCHANGE OVERLAY ===== -->
<div id="meetOverlay" class="meet-overlay hidden">
    <button class="meet-close" onclick="closeMeetScreen()" aria-label="Close">✕</button>
    <div class="meet-qr-section">
        <div class="meet-qr-box" id="meetQrBox">
            <!-- QR code rendered here -->
        </div>
        <button class="meet-copy-btn" id="meetCopyBtn" onclick="copyMeetLink()" style="display:none;">📋 Copy invite link</button>
    </div>
    <div class="meet-camera-section">
        <video id="meetVideo" autoplay playsinline muted></video>
        <canvas id="meetCanvas" style="display:none;"></canvas>
        <div class="meet-scan-hint" id="meetScanHint">Show your phones to each other</div>
    </div>
</div>

<!-- ===== CONTACT LIST OVERLAY ===== -->
<div id="contactsOverlay" class="contacts-overlay hidden">
    <div class="contacts-header">
        <h2>Contacts</h2>
        <button type="button" class="contacts-close" onclick="closeContactListScreen()" aria-label="Close">✕</button>
    </div>
    <div class="contacts-search-wrap">
        <span class="contacts-search-icon" aria-hidden="true">🔍</span>
        <input
            type="search"
            id="contactsSearchInput"
            class="contacts-search-input"
            placeholder="Search name, email, or phone"
            aria-label="Search contacts"
            autocomplete="off">
    </div>
    <div class="contacts-list-wrap" id="contactsListContent">
        <p style="color:var(--dark-gray);text-align:center;padding:2rem;">Loading…</p>
    </div>
</div>

<!-- ===== MODAL CONTAINER ===== -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalBody">
        <!-- Populated dynamically per modal type -->
    </div>
</div>

<!-- ===== EXTERNAL LIBRARIES ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<!-- ===== APP MODULES ===== -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/session.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/avatars.js"></script>
<script src="js/chat.js"></script>
<script src="js/transactions.js"></script>
<script src="js/members.js"></script>
<script src="js/candidates.js"></script>
<script src="js/stats.js"></script>
<script src="js/constitution.js"></script>
<script src="js/groups.js"></script>
<script src="js/tabs.js"></script>
<script src="js/modals.js"></script>
<script src="js/create-group.js"></script>
<script src="js/sponsor.js"></script>
<script src="js/send-currency.js"></script>
<script src="js/vote.js"></script>
<script src="js/realtime.js"></script>
<script src="js/meet.js"></script>
<script src="js/contacts.js"></script>
<script src="js/preferences.js"></script>
<script src="js/web-of-trust.js"></script>
<script src="js/push.js"></script>
<script src="js/init.js"></script>
<script src="js/boot.js"></script>

<!-- PWA: Register service worker -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log(APP_NAME + ' SW registered, scope:', reg.scope))
        .catch(err => console.error(APP_NAME + ' SW registration failed:', err));
}
</script>
</body>
</html>
