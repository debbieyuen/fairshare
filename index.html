// Build word-level attribution by replaying edit history diffs.
// Returns an array of { word, user_id, created_at } for each word in the final content.
function buildWordAttribution(history) {
    if (!history || history.length === 0) return [];

    // Start with the first revision — all words attributed to its author
    let prevWords = history[0].content.split(/(\s+)/);
    let attribution = prevWords.map(w => ({
        word: w,
        user_id: history[0].user_id,
        created_at: history[0].created_at
    }));

    // Replay each subsequent revision
    for (let h = 1; h < history.length; h++) {
        const rev = history[h];
        const newWords = rev.content.split(/(\s+)/);
        const diff = wordDiffRaw(
            prevWords.join(''),
            newWords.join('')
        );

        // Walk through the diff and build a new attribution array
        const newAttribution = [];
        let oldIdx = 0;  // pointer into previous attribution array

        for (const entry of diff) {
            if (entry.type === 'same') {
                // Carry forward the existing attribution
                // Find the matching old word
                while (oldIdx < attribution.length && attribution[oldIdx].word !== entry.text) {
                    oldIdx++;
                }
                if (oldIdx < attribution.length) {
                    newAttribution.push(attribution[oldIdx]);
                    oldIdx++;
                } else {
                    // Fallback — shouldn't happen, but attribute to current revision
                    newAttribution.push({ word: entry.text, user_id: rev.user_id, created_at: rev.created_at });
                }
            } else if (entry.type === 'ins') {
                // New/inserted word — attribute to this revision's author
                newAttribution.push({ word: entry.text, user_id: rev.user_id, created_at: rev.created_at });
            }
            // 'del' entries are dropped (they no longer exist in the new text)
        }

        attribution = newAttribution;
        prevWords = newWords;
    }

    return attribution;
}

// Render the document content with hover attribution spans
function renderAttributedDocument(attribution, profileMap) {
    if (attribution.length === 0) {
        return '<p style="color:var(--dark-gray);font-style:italic;">No content yet. Click Edit to add something.</p>';
    }

    let html = '<div class="group-doc-text" style="white-space:pre-wrap;word-wrap:break-word;line-height:1.7;font-size:0.95rem;">';
    for (const item of attribution) {
        const name = profileMap[item.user_id] || 'Unknown';
        const date = new Date(item.created_at);
        const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' })
            + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const tooltip = `${name} — ${dateStr}`;
        // Only wrap non-whitespace tokens in spans (whitespace renders as-is)
        if (item.word.trim()) {
            html += `<span title="${esc(tooltip)}" style="cursor:default;">${esc(item.word)}</span>`;
        } else {
            html += esc(item.word);
        }
    }
    html += '</div>';
    return html;
}

let _docLoadGen = 0;
async function loadGroupDocument() {
    if (!selectedGroup) return;
    const myGen = ++_docLoadGen;
    const groupId = selectedGroup.id;
    const el = document.getElementById('groupDocContent');
    if (!el) return;
    el.innerHTML = '<p style="color:var(--dark-gray);">Loading…</p>';

    try {
        // Fetch current document and full history in parallel
        const [docResult, histResult] = await Promise.all([
            db.from('group_documents').select('*').eq('group_id', groupId).maybeSingle(),
            db.from('document_history').select('*').eq('group_id', groupId).order('created_at', { ascending: true })
        ]);

        if (myGen !== _docLoadGen) return;

        if (docResult.error) {
            console.error('loadGroupDocument error:', docResult.error);
            el.innerHTML = `<p style="color:var(--red);">Error loading document: ${esc(docResult.error.message)}</p>`;
            return;
        }

        const doc = docResult.data;
        const history = histResult.data || [];

        // Build a profile name map for all authors in the history
        const authorIds = [...new Set(history.map(h => h.user_id))];
        const profileMap = {};
        for (const uid of authorIds) {
            profileMap[uid] = await getDisplayName(uid);
        }

        if (myGen !== _docLoadGen) return;

        // Build attribution if there's content
        let contentHtml;
        if (doc && doc.content && doc.content.trim()) {
            const attribution = buildWordAttribution(history);
            contentHtml = renderAttributedDocument(attribution, profileMap);
        } else {
            contentHtml = '<p style="color:var(--dark-gray);font-style:italic;">No content yet. Click Edit to add something.</p>';
        }

        let html = contentHtml;
        html += `<div style="margin-top:0.75rem;">
            <button class="btn btn-secondary btn-small" onclick="editGroupDocument()">Edit</button>
        </div>`;

        if (myGen !== _docLoadGen) return;
        el.innerHTML = html;
    } catch (e) {
        console.error('loadGroupDocument error:', e);
        if (myGen === _docLoadGen) {
            el.innerHTML = `<p style="color:var(--red);">Failed to load document: ${esc(e.message || e)}</p>`;
        }
    }
}

function editGroupDocument() {
    const el = document.getElementById('groupDocContent');
    if (!el) return;

    // Fetch current text from the rendered content (or empty for new)
    const existingTextEl = el.querySelector('.group-doc-text');
    let currentText = '';
    if (existingTextEl) {
        currentText = existingTextEl.textContent;
    }

    el.innerHTML = `
        <textarea id="groupDocEditor" rows="10"
            style="width:100%;font-family:inherit;font-size:0.95rem;line-height:1.6;padding:0.75rem;border:1px solid var(--medium-gray);border-radius:6px;resize:vertical;"
            placeholder="Use this space for announcements, marketplace listings, contact info, or anything the group wants to share…"
        >${esc(currentText)}</textarea>
        <div style="margin-top:0.5rem;display:flex;gap:0.5rem;">
            <button class="btn btn-primary btn-small" onclick="saveGroupDocument()">Save</button>
            <button class="btn btn-secondary btn-small" onclick="loadGroupDocument()">Cancel</button>
        </div>
    `;

    // Focus the editor
    const editor = document.getElementById('groupDocEditor');
    if (editor) editor.focus();
}

async function saveGroupDocument() {
    if (!selectedGroup) return;
    const editor = document.getElementById('groupDocEditor');
    if (!editor) return;

    const content = editor.value;

    // Disable buttons while saving
    editor.disabled = true;
    const buttons = editor.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true);

    try {
        const { data, error } = await db.rpc('save_document', {
            p_group_id: selectedGroup.id,
            p_content: content
        });

        if (error) {
            showToast('Failed to save document: ' + error.message, 'error');
            editor.disabled = false;
            buttons.forEach(b => b.disabled = false);
            return;
        }

        showToast('Document saved', 'success');
        await loadGroupDocument();
    } catch (e) {
        showToast('Failed to save document: ' + (e.message || e), 'error');
        editor.disabled = false;
        buttons.forEach(b => b.disabled = false);
    }
}

// Load the Constitution content
let _constitutionLoadGen = 0;  // generation counter to prevent stale writes
async function loadConstitutionContent() {
    if (!selectedGroup) return;
    const myGen = ++_constitutionLoadGen;       // claim this generation
    const groupId = selectedGroup.id;           // pin the group id
    const el = document.getElementById('constitutionContent');
    if (!el) return;
    el.innerHTML = '<p style="color:var(--dark-gray);">Loading…</p>';

    try {
        // Refresh group data to get latest constitution
        const { data: freshGroup, error: groupErr } = await db
            .from('groups')
            .select('*')
            .eq('id', groupId)
            .single();

        if (myGen !== _constitutionLoadGen) return;  // stale – a newer call took over

        if (groupErr) {
            console.error('loadConstitution group fetch error:', groupErr);
            el.innerHTML = `<p style="color:var(--red);">Error loading group data: ${esc(groupErr.message)}</p>`;
            return;
        }
        if (freshGroup) {
            selectedGroup = freshGroup;   // safe: we checked generation
        }

        const constitutionHtml = `<div class="constitution-text">${renderConstitution(selectedGroup.constitution)}</div>`;

        // Load active and past amendments in parallel
        const [activeResult, pastResult, memberResult] = await Promise.all([
            db.from('amendments')
                .select('*, proposer:profiles(display_name)')
                .eq('group_id', groupId)
                .eq('status', 'voting')
                .order('created_at', { ascending: false }),
            db.from('amendments')
                .select('*, proposer:profiles(display_name)')
                .eq('group_id', groupId)
                .in('status', ['passed', 'failed', 'withdrawn'])
                .order('resolved_at', { ascending: false })
                .limit(20),
            db.from('members')
                .select('*', { count: 'exact', head: true })
                .eq('group_id', groupId)
                .eq('status', 'active')
        ]);

        if (myGen !== _constitutionLoadGen) return;  // stale

        if (activeResult.error) console.warn('loadConstitution active amendments error:', activeResult.error);
        if (pastResult.error) console.warn('loadConstitution past amendments error:', pastResult.error);

        const activeAmendments = activeResult.data;
        const pastAmendments = pastResult.data;
        const activeMembers = memberResult.count;

        // Get vote counts for all amendments we're showing
        const allAmendmentIds = [
            ...(activeAmendments || []).map(a => a.id),
            ...(pastAmendments || []).map(a => a.id)
        ];

        let votesMap = {};
        let myVotesMap = {};
        if (allAmendmentIds.length > 0) {
            const { data: votes } = await db
                .from('amendment_votes')
                .select('amendment_id, user_id, vote')
                .in('amendment_id', allAmendmentIds);

            if (myGen !== _constitutionLoadGen) return;  // stale

            (votes || []).forEach(v => {
                if (!votesMap[v.amendment_id]) votesMap[v.amendment_id] = { approve: 0, reject: 0 };
                if (v.vote) votesMap[v.amendment_id].approve++;
                else votesMap[v.amendment_id].reject++;
                if (v.user_id === currentUser.id) myVotesMap[v.amendment_id] = v.vote;
            });
        }

        let html = constitutionHtml;

        // Propose button
        html += `<div style="margin:1rem 0;">
            <button class="btn btn-primary" onclick="showModal('proposeAmendment')">Propose an Amendment</button>
        </div>`;

        // Active amendments
        if (activeAmendments && activeAmendments.length > 0) {
            html += `<h4 style="margin:1.5rem 0 0.5rem;color:var(--accent-color);">Active Amendments</h4>`;
            html += activeAmendments.map(a => renderAmendmentCard(a, votesMap, myVotesMap, activeMembers)).join('');
        }

        // Past amendments
        if (pastAmendments && pastAmendments.length > 0) {
            html += `<h4 style="margin:1.5rem 0 0.5rem;color:var(--accent-color);">Amendment History</h4>`;
            html += pastAmendments.map(a => renderAmendmentCard(a, votesMap, myVotesMap, activeMembers)).join('');
        }

        if (myGen !== _constitutionLoadGen) return;  // final stale check before DOM write
        el.innerHTML = html;
    } catch (e) {
        console.error('loadConstitution error:', e);
        if (myGen === _constitutionLoadGen) {
            el.innerHTML = `<p style="color:var(--red);">Failed to load constitution: ${esc(e.message || e)}</p>`;
        }
    }
}

function renderAmendmentCard(a, votesMap, myVotesMap, activeMemberCount) {
    const votes = votesMap[a.id] || { approve: 0, reject: 0 };
    const myVote = myVotesMap[a.id];
    const total = activeMemberCount || 1;
    const pct = total > 0 ? (votes.approve / total * 100) : 0;
    const thresholdPct = (a.threshold * 100);
    const now = new Date();
    const expires = new Date(a.expires_at);
    const isExpired = expires <= now;
    const timeLeft = isExpired ? 'Expired' : formatTimeLeft(expires - now);

    let diffHtml = wordDiff(a.old_text || '', a.new_text || '');

    let actions = '';
    if (a.status === 'voting') {
        if (isExpired) {
            actions = `<button class="btn btn-primary btn-small" onclick="resolveAmendment('${a.id}')">Resolve Vote</button>`;
        } else {
            const approveClass = myVote === true ? 'btn-success' : 'btn-outline';
            const rejectClass = myVote === false ? 'btn-danger' : 'btn-outline';
            actions = `
                <button class="btn ${approveClass} btn-small" onclick="voteAmendment('${a.id}', true)"
                    ${myVote === true ? 'disabled' : ''}>Approve${myVote === true ? 'd' : ''}</button>
                <button class="btn ${rejectClass} btn-small" onclick="voteAmendment('${a.id}', false)"
                    ${myVote === false ? 'disabled' : ''}>Reject${myVote === false ? 'ed' : ''}</button>
            `;
            if (a.proposed_by === currentUser.id) {
                actions += ` <button class="btn btn-secondary btn-small" onclick="withdrawAmendment('${a.id}')">Withdraw</button>`;
            }
        }
    }

    return `<div class="amendment-card ${a.status}">
        <div class="amendment-header">
            <span class="amendment-title">${esc(a.title)}</span>
            <span class="amendment-status ${a.status}">${a.status}</span>
        </div>
        <div class="amendment-meta">
            Proposed by ${esc(a.proposer?.display_name || 'Unknown')}
            &middot; ${a.status === 'voting' ? timeLeft : (a.resolved_at ? new Date(a.resolved_at).toLocaleDateString() : '')}
        </div>
        <div class="vote-bar">
            <span style="font-size:0.8rem;font-weight:600;">${votes.approve}/${total}</span>
            <div class="vote-bar-track">
                <div class="vote-bar-fill" style="width:${pct}%"></div>
                <div class="vote-bar-threshold" style="left:${thresholdPct}%" title="Threshold: ${thresholdPct}%"></div>
            </div>
            <span style="font-size:0.75rem;color:var(--dark-gray);">need ${thresholdPct}%</span>
        </div>
        <details style="margin:0.5rem 0;">
            <summary style="cursor:pointer;font-size:0.85rem;color:var(--primary-color);font-weight:500;">Show changes</summary>
            <div class="diff-display" style="margin-top:0.5rem;">${diffHtml}</div>
        </details>
        ${actions ? `<div style="display:flex;gap:0.5rem;margin-top:0.5rem;">${actions}</div>` : ''}
    </div>`;
}

function formatTimeLeft(ms) {
    const days = Math.floor(ms / 86400000);
    const hours = Math.floor((ms % 86400000) / 3600000);
    if (days > 0) return `${days}d ${hours}h left`;
    const mins = Math.floor((ms % 3600000) / 60000);
    if (hours > 0) return `${hours}h ${mins}m left`;
    return `${mins}m left`;
}

// Live diff preview in the propose amendment modal
function updateAmendmentPreview() {
    const oldText = selectedGroup?.constitution || '';
    const newText = document.getElementById('amendmentEditor').value;
    const preview = document.getElementById('amendmentDiffPreview');
    if (oldText === newText) {
        preview.innerHTML = '<span style="color:var(--dark-gray);">No changes yet.</span>';
    } else {
        preview.innerHTML = wordDiff(oldText, newText);
    }
}

async function submitAmendment() {
    if (!selectedGroup) return;
    const title = document.getElementById('amendmentTitle').value.trim();
    const newText = document.getElementById('amendmentEditor').value;
    const oldText = selectedGroup.constitution || '';

    if (!title) { showToast('Please enter a title for the amendment', 'error'); return; }
    if (newText === oldText) { showToast('No changes detected in the constitution', 'error'); return; }

    const threshold = parseAmendmentThreshold(oldText);

    const { error } = await db.from('amendments').insert({
        group_id: selectedGroup.id,
        proposed_by: currentUser.id,
        title,
        old_text: oldText,
        new_text: newText,
        threshold
    });

    if (error) { showToast(error.message, 'error'); return; }

    // Log the event for realtime notifications
    await db.rpc('log_group_event', {
        p_group_id: selectedGroup.id,
        p_event_type: 'amendment_proposed',
        p_summary: 'Amendment proposed: ' + title,
        p_metadata: { title }
    });

    showToast('Amendment proposed! Members have 7 days to vote.', 'success');
    closeModal();
    if (activeTab === 'constitution') await loadConstitutionContent();
}

async function voteAmendment(amendmentId, approve) {
    const { error } = await db.from('amendment_votes').upsert({
        amendment_id: amendmentId,
        user_id: currentUser.id,
        vote: approve
    }, { onConflict: 'amendment_id,user_id' });

    if (error) { showToast(error.message, 'error'); return; }

    // After an approval vote, check if threshold is now met
    if (approve) {
        const { data, error: resolveError } = await db.rpc('resolve_amendment', { p_amendment_id: amendmentId });
        if (!resolveError && data?.passed) {
            showToast(`Amendment passed! (${data.approve_count}/${data.active_members} approved, ${data.ratio}% ≥ ${data.threshold}% needed)`, 'success');
            // Refresh group data since constitution may have changed
            const { data: freshGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
            if (freshGroup) {
                selectedGroup = freshGroup;
                const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                if (membership) membership.groups = freshGroup;
                renderGroupList();
            }
            await loadConstitutionContent();
            return;
        }
    }

    showToast(approve ? 'Voted to approve' : 'Voted to reject', 'info');
    await loadConstitutionContent();
}

async function resolveAmendment(amendmentId) {
    const { data, error } = await db.rpc('resolve_amendment', { p_amendment_id: amendmentId });
    if (error) { showToast(error.message, 'error'); return; }

    if (data?.resolved === false) {
        showToast(`Not enough votes yet (${data.approve_count}/${data.active_members}, need ${data.threshold}%)`, 'info');
    } else if (data?.passed) {
        showToast(`Amendment passed! (${data.approve_count}/${data.active_members} approved, ${data.ratio}% ≥ ${data.threshold}% needed)`, 'success');
        const { data: freshGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
        if (freshGroup) {
            selectedGroup = freshGroup;
            const membership = myGroups.find(m => m.group_id === selectedGroup.id);
            if (membership) membership.groups = freshGroup;
            renderGroupList();
        }
    } else {
        showToast(`Amendment failed. (${data.approve_count}/${data.active_members} approved, ${data.ratio}% < ${data.threshold}% needed)`, 'error');
    }
    await loadConstitutionContent();
}

async function withdrawAmendment(amendmentId) {
    console.log('withdrawAmendment called with:', amendmentId);
    try {
        const { data, error } = await db
            .from('amendments')
            .update({ status: 'withdrawn' })
            .eq('id', amendmentId)
            .select()
            .single();

        console.log('withdrawAmendment result:', { data, error });
        if (error) {
            console.error('withdrawAmendment error:', error);
            showToast(error.message, 'error');
            return;
        }
        showToast('Amendment withdrawn', 'info');
        await loadConstitutionContent();
    } catch (e) {
        console.error('withdrawAmendment exception:', e);
        showToast('Error withdrawing amendment: ' + e.message, 'error');
    }
}

function subscribeToGroup(groupId) {
    // Unsubscribe from previous group channel
    if (groupChannel) {
        db.removeChannel(groupChannel);
        groupChannel = null;
    }

    groupChannel = db.channel(`group-${groupId}`)
        .on('postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'group_events',
              filter: `group_id=eq.${groupId}` },
            (payload) => handleGroupEvent(payload.new)
        )
        .on('postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'chat_messages',
              filter: `group_id=eq.${groupId}` },
            async (payload) => {
                const msg = payload.new;
                const msgsEl = document.getElementById('chatMessages');
                if (msgsEl) {
                    appendChatMessage(msg);
                } else if (msg.user_id !== currentUser?.id) {
                    const name = await getDisplayName(msg.user_id);
                    const preview = msg.body.length > 80 ? msg.body.slice(0, 80) + '…' : msg.body;
                    showToast(`💬 ${name}: ${preview}`, 'info');
                }
            }
        )
        .on('postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'document_history',
              filter: `group_id=eq.${groupId}` },
            async (payload) => {
                const edit = payload.new;
                // If we're on the Docs tab, refresh the document display
                if (activeTab === 'constitution') {
                    // Only auto-refresh if the editor isn't open (don't clobber in-progress edits)
                    if (!document.getElementById('groupDocEditor')) {
                        await loadGroupDocument();
                    }
                }
                // Toast for other members
                if (edit.user_id !== currentUser?.id) {
                    const name = await getDisplayName(edit.user_id);
                    showToast(`📄 ${name} updated the group document`, 'info');
                }
            }
        )
        .subscribe();
}

async function handleGroupEvent(event) {
    if (!event || !selectedGroup || event.group_id !== selectedGroup.id) return;

    // Don't toast events we triggered ourselves
    const isMine = event.actor_id === currentUser?.id;

    // Show toast to other members (not the actor)
    if (!isMine) {
        showToast(event.summary, 'info');
    }

    // Prepend to the activity log UI (skip transactions — they have their own panel)
    if (event.event_type !== 'payment_received') {
        const logEl = document.getElementById('activityContent');
        if (logEl) {
            const itemHtml = renderActivityItem(event, true);
            logEl.insertAdjacentHTML('afterbegin', itemHtml);

            // Trim to 20 items
            const items = logEl.querySelectorAll('.activity-item');
            if (items.length > 20) {
                for (let i = 20; i < items.length; i++) items[i].remove();
            }
        }
    }

    // Refresh relevant UI based on event type
    switch (event.event_type) {
        case 'rate_change': {
            // Re-fetch group data to update money tab
            const { data: updatedGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
            if (updatedGroup) {
                selectedGroup = updatedGroup;
                const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                if (membership) membership.groups = updatedGroup;
            }
            if (activeTab === 'money') await renderMoneyTab();
            break;
        }
        case 'member_joined':
        case 'member_sponsored': {
            // Refresh member count / candidates
            await loadMyGroups();
            if (activeTab === 'members') await renderMembersTab();
            break;
        }
        case 'payment_received': {
            // Refresh balance if we are the recipient
            const toUser = event.metadata?.to_user;
            if (toUser === currentUser?.id) {
                const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                if (membership) {
                    const { data: myMember } = await db.from('members').select('balance')
                        .eq('group_id', selectedGroup.id).eq('user_id', currentUser.id).single();
                    if (myMember) {
                        membership.balance = myMember.balance;
                        const balEl = document.getElementById('balanceAmount');
                        if (balEl) balEl.textContent =
                            `${selectedGroup.currency_symbol} ${Number(myMember.balance).toFixed(2)}`;
                    }
                }
                if (activeTab === 'money') await loadTransactions();
            }
            break;
        }
        case 'amendment_proposed':
        case 'amendment_passed':
        case 'amendment_failed': {
            if (activeTab === 'constitution') await loadConstitutionContent();
            // Amendment pass may have changed group settings
            if (event.event_type === 'amendment_passed') {
                const { data: freshGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
                if (freshGroup) {
                    selectedGroup = freshGroup;
                    const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                    if (membership) membership.groups = freshGroup;
                    renderGroupList();
                }
                if (activeTab === 'money') await renderMoneyTab();
            }
            break;
        }
    }
}

async function loadActivityLog() {
    if (!selectedGroup) return;

    const { data, error } = await db
        .from('group_events')
        .select('*')
        .eq('group_id', selectedGroup.id)
        .neq('event_type', 'payment_received')
        .order('created_at', { ascending: false })
        .limit(20);

    const logEl = document.getElementById('activityContent');
    if (error || !data || data.length === 0) {
        logEl.innerHTML = '<p style="color:var(--dark-gray);font-size:0.85rem;">No activity yet.</p>';
        return;
    }

    logEl.innerHTML = data.map(e => renderActivityItem(e, false)).join('');
}

function renderActivityItem(event, highlight) {
    const ago = formatTimeAgo(new Date(event.created_at));
    return `<div class="activity-item${highlight ? ' highlight' : ''}">
        <span class="activity-time">${esc(ago)}</span>
        <span class="activity-summary">${esc(event.summary)}</span>
    </div>`;
}

function formatTimeAgo(date) {
    const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
    if (seconds < 60) return 'just now';
    const mins = Math.floor(seconds / 60);
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 30) return `${days}d ago`;
    return date.toLocaleDateString();
}

// ============================================================
// MEET / QR CONTACT EXCHANGE
// ============================================================
let meetScanTimer = null;
let meetStream = null;
let meetChannel = null;
let meetHandled = false; // prevent duplicate scans

async function openMeetScreen() {
    if (!currentUser) return;

    meetHandled = false;

    // 1. Request camera FIRST — iOS Safari requires getUserMedia to be called
    //    in the direct user-gesture call stack (before any await to network).
    //    Use ideal facingMode so it falls back gracefully on all devices.
    let cameraOk = false;
    try {
        meetStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'user' }, width: { ideal: 640 }, height: { ideal: 480 } }
        });
        cameraOk = true;
    } catch (camErr) {
        console.warn('[meet] Camera access denied or unavailable:', camErr);
    }

    // 2. Show the overlay immediately (camera preview + loading QR)
    document.getElementById('meetOverlay').classList.remove('hidden');
    document.getElementById('meetScanHint').textContent = cameraOk
        ? 'Point at the other person\'s QR code'
        : 'Camera unavailable — ask the other person to scan your code';
    document.getElementById('meetQrBox').innerHTML =
        '<div style="color:var(--dark-gray);font-size:0.85rem;padding:1rem;">Loading…</div>';

    // 3. Attach camera to video element if available
    if (cameraOk) {
        const video = document.getElementById('meetVideo');
        video.srcObject = meetStream;
        try { await video.play(); } catch (_) { /* iOS sometimes ignores this */ }
    }

    // 4. Create a meet request in the database (network call after camera)
    const { data, error } = await db
        .from('meet_requests')
        .insert({ user_id: currentUser.id })
        .select('token')
        .single();

    if (error) {
        showToast('Could not start meet: ' + error.message, 'error');
        closeMeetScreen();
        return;
    }

    const token = data.token;

    // 5. Generate QR code encoding the token
    const qr = qrcode(0, 'M');
    qr.addData('fairshare-meet:' + token);
    qr.make();
    const qrBox = document.getElementById('meetQrBox');
    if (qrBox) qrBox.innerHTML = qr.createSvgTag({ cellSize: 5, margin: 4 });

    // 6. Subscribe to Realtime on contacts table for this user
    // (so if the OTHER person scans first, we still get notified)
    meetChannel = db.channel('meet-contacts')
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'contacts',
            filter: 'user_id=eq.' + currentUser.id
        }, (payload) => {
            if (meetHandled) return;
            meetHandled = true;
            const contactId = payload.new.contact_id;
            // Look up the contact's name
            db.from('profiles').select('display_name').eq('id', contactId).single()
                .then(({ data: profile }) => {
                    const name = profile?.display_name || 'someone';
                    meetSuccess(name);
                });
        })
        .subscribe();

    // 7. Begin scanning loop if camera is active
    if (cameraOk) {
        meetScanLoop();
    }
}

function meetScanLoop() {
    if (meetHandled) return;

    const video = document.getElementById('meetVideo');
    const canvas = document.getElementById('meetCanvas');

    if (video.readyState < video.HAVE_ENOUGH_DATA) {
        meetScanTimer = requestAnimationFrame(meetScanLoop);
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
    });

    if (code && code.data && code.data.startsWith('fairshare-meet:')) {
        const scannedToken = code.data.replace('fairshare-meet:', '');
        if (!meetHandled) {
            meetHandled = true;
            handleMeetScan(scannedToken);
        }
        return;
    }

    // Continue scanning
    meetScanTimer = requestAnimationFrame(meetScanLoop);
}

async function handleMeetScan(token) {
    document.getElementById('meetScanHint').textContent = 'Connecting...';

    try {
        const { data, error } = await db.rpc('complete_meet', { p_token: token });

        if (error) {
            showToast('Meet failed: ' + error.message, 'error');
            meetHandled = false; // allow retry
            meetScanLoop();
            return;
        }

        const contactName = data?.contact_name || 'New contact';
        meetSuccess(contactName);
    } catch (e) {
        showToast('Meet error: ' + e.message, 'error');
        meetHandled = false;
        meetScanLoop();
    }
}

function meetSuccess(contactName) {
    // Vibrate the phone
    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
    }

    // Show success in the overlay
    document.getElementById('meetScanHint').textContent = '';
    const qrBox = document.getElementById('meetQrBox');
    qrBox.outerHTML = `<div class="meet-success">✓ Connected with ${esc(contactName)}!</div>`;

    showToast('Contact added: ' + contactName, 'success');

    // Auto-close after a short delay, then open contact list so user sees new contact at top
    setTimeout(() => {
        closeMeetScreen();
        openContactListScreen();
    }, 2500);
}

function closeMeetScreen() {
    // Stop camera
    if (meetStream) {
        meetStream.getTracks().forEach(t => t.stop());
        meetStream = null;
    }
    const video = document.getElementById('meetVideo');
    if (video) video.srcObject = null;

    // Stop scanning
    if (meetScanTimer) {
        cancelAnimationFrame(meetScanTimer);
        meetScanTimer = null;
    }

    // Unsubscribe from Realtime
    if (meetChannel) {
        db.removeChannel(meetChannel);
        meetChannel = null;
    }

    meetHandled = false;

    // Reset QR area (in case meetSuccess replaced it)
    const overlay = document.getElementById('meetOverlay');
    const qrSection = overlay.querySelector('.meet-qr-section');
    if (qrSection && !document.getElementById('meetQrBox')) {
        // Restore the QR box element if it was replaced by success message
        const successEl = qrSection.querySelector('.meet-success');
        if (successEl) {
            successEl.outerHTML = '<div class="meet-qr-box" id="meetQrBox"></div>';
        }
    }

    // Hide overlay
    overlay.classList.add('hidden');
}

async function openContactListScreen() {
    if (!currentUser) return;
    const overlay = document.getElementById('contactsOverlay');
    const content = document.getElementById('contactsListContent');
    overlay.classList.remove('hidden');
    content.innerHTML = '<p style="color:var(--dark-gray);text-align:center;padding:2rem;">Loading…</p>';
    await loadAndRenderContactList();
}

function closeContactListScreen() {
    document.getElementById('contactsOverlay').classList.add('hidden');
}

async function loadAndRenderContactList() {
    const content = document.getElementById('contactsListContent');
    try {
        const { data: contacts, error } = await db
            .from('contacts')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (!contacts || contacts.length === 0) {
            content.innerHTML = '<p style="color:var(--dark-gray);text-align:center;padding:2rem;">No contacts yet. Use the handshake icon to add someone.</p>';
            return;
        }

        const contactIds = [...new Set(contacts.map(c => c.contact_id))];
        let profileMap = {};
        if (contactIds.length > 0) {
            const { data: profiles } = await db.from('profiles').select('id, display_name, profile_image_url, phone, email').in('id', contactIds);
            if (profiles) profiles.forEach(p => { profileMap[p.id] = p; });
        }

        let sharedByThemMap = {};
        try {
            const { data: sharedRows } = await db.from('contact_shared').select('user_id, shared_phone, shared_email').eq('contact_id', currentUser.id).in('user_id', contactIds);
            if (sharedRows) sharedRows.forEach(r => { sharedByThemMap[r.user_id] = r; });
        } catch (_) { /* contact_shared table may not exist yet */ }

        content.innerHTML = contacts.map(c => {
            const profile = profileMap[c.contact_id] || {};
            const shared = sharedByThemMap[c.contact_id] || {};
            return renderContactRow(c, profile, shared);
        }).join('');

        content.querySelectorAll('.contact-row').forEach((row) => {
            row.addEventListener('click', (e) => {
                if (e.target.closest('.contact-detail-actions') || e.target.closest('.contact-selfie-wrap') || e.target.closest('input') || e.target.closest('button')) return;
                row.classList.toggle('expanded');
            });
        });
        content.addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-share-with-contact');
            if (btn) {
                e.stopPropagation();
                openShareWithContact(btn.dataset.contactId || '', btn.dataset.contactName || 'contact');
            }
        });
    } catch (e) {
        console.error('Load contacts error:', e);
        content.innerHTML = '<p style="color:var(--red);text-align:center;padding:2rem;">Failed to load contacts.</p>';
    }
}

function renderContactRow(contact, profile, shared) {
    const name = profile.display_name || 'Unknown';
    const avatarUrl = profile.profile_image_url || null;
    const phone = (shared.shared_phone != null && shared.shared_phone !== '') ? shared.shared_phone : '';
    const email = (shared.shared_email != null && shared.shared_email !== '') ? shared.shared_email : '';
    const cid = esc(contact.contact_id);
    const selfieUrl = contact.selfie_url || null;
    const avatarHtml = avatarUrl
        ? `<img class="contact-row-avatar" src="${esc(avatarUrl)}" alt="">`
        : '<div class="contact-row-avatar-placeholder">👤</div>';
    const selfieHtml = selfieUrl
        ? `<img src="${esc(selfieUrl)}" alt="Selfie">`
        : '<span title="Tap to take a selfie">📷</span>';
    return `
        <div class="contact-row" data-contact-id="${cid}">
            <div class="contact-row-header">
                ${avatarHtml}
                <span class="contact-row-name">${esc(name)}</span>
                <span class="contact-row-chevron">›</span>
            </div>
            <div class="contact-detail">
                ${phone ? `<div class="contact-detail-line">📞 <a href="tel:${esc(phone)}">${esc(phone)}</a></div>` : ''}
                ${email ? `<div class="contact-detail-line">✉ <a href="mailto:${esc(email)}">${esc(email)}</a></div>` : ''}
                <div class="contact-detail-line">Selfie</div>
                <div class="contact-selfie-wrap" onclick="event.stopPropagation();openContactSelfie('${cid}')">${selfieHtml}</div>
                <div class="contact-detail-actions">
                    <button type="button" class="btn btn-primary btn-small btn-share-with-contact" data-contact-id="${cid}" data-contact-name="${esc(name)}">Share</button>
                </div>
            </div>
        </div>`;
}

function openContactSelfie(contactId) {
    contactSelfieId = contactId;
    showModal('contactSelfie');
}

function closeContactSelfieModal() {
    stopContactSelfieStream();
    contactSelfieId = null;
    closeModal();
    if (document.getElementById('contactsListContent') && !document.getElementById('contactsOverlay').classList.contains('hidden')) {
        loadAndRenderContactList();
    }
}

async function startContactSelfieStream() {
    stopContactSelfieStream();
    const video = document.getElementById('contactSelfieVideo');
    if (!video) return;
    try {
        contactSelfieStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 640 } }
        });
        video.srcObject = contactSelfieStream;
        await video.play();
    } catch (e) {
        console.error('Contact selfie camera error:', e);
        showToast('Camera unavailable: ' + (e.message || 'error'), 'error');
        closeContactSelfieModal();
    }
}

function stopContactSelfieStream() {
    if (contactSelfieStream) {
        contactSelfieStream.getTracks().forEach(t => t.stop());
        contactSelfieStream = null;
    }
    const video = document.getElementById('contactSelfieVideo');
    if (video) video.srcObject = null;
}

async function captureContactSelfie() {
    const cid = contactSelfieId;
    if (!cid || !currentUser) return;
    const video = document.getElementById('contactSelfieVideo');
    if (!video || video.readyState < 2) {
        showToast('Camera not ready — please wait a moment and try again.', 'error');
        return;
    }
    const btn = document.getElementById('contactSelfieCaptureBtn');
    if (btn) btn.disabled = true;
    try {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
        if (!blob) throw new Error('Could not capture image from camera');
        const file = new File([blob], 'selfie.jpg', { type: 'image/jpeg' });
        const filePath = `${currentUser.id}/selfie_${cid}_${Date.now()}.jpg`;
        const { error: upErr } = await db.storage.from('avatars').upload(filePath, file, { upsert: true });
        if (upErr) throw upErr;
        const { data: urlData } = db.storage.from('avatars').getPublicUrl(filePath);
        const selfieUrl = urlData.publicUrl;
        const { error: rpcErr } = await db.rpc('set_contact_selfie', {
            p_contact_id: cid,
            p_selfie_url: selfieUrl
        });
        if (rpcErr) throw rpcErr;
        showToast('Selfie saved!', 'success');
    } catch (e) {
        console.error('Capture selfie error:', e);
        showToast('Could not save selfie: ' + (e.message || 'error'), 'error');
    }
    if (btn) btn.disabled = false;
    closeContactSelfieModal();
}

function openShareWithContact(contactId, contactName) {
    shareWithContactId = contactId;
    shareWithContactName = contactName || 'contact';
    showModal('shareWithContact');
}

async function submitShareWithContact(e) {
    e.preventDefault();
    if (!shareWithContactId) { closeModal(); return; }
    const sharePhone = document.getElementById('sharePhone').checked;
    const shareEmail = document.getElementById('shareEmail').checked;
    const phone = sharePhone ? (currentProfile?.phone || '') : null;
    const email = shareEmail ? (currentProfile?.email || '') : null;
    try {
        await db.from('contact_shared').upsert({
            user_id: currentUser.id,
            contact_id: shareWithContactId,
            shared_phone: phone,
            shared_email: email
        }, { onConflict: 'user_id,contact_id' });
        if (sharePhone) {
            await db.from('contact_shares').insert({ from_user_id: currentUser.id, to_user_id: shareWithContactId, shared_type: 'phone' });
        }
        if (shareEmail) {
            await db.from('contact_shares').insert({ from_user_id: currentUser.id, to_user_id: shareWithContactId, shared_type: 'email' });
        }
        showToast('Shared.', 'success');
    } catch (err) {
        console.error('Share with contact error:', err);
        showToast('Could not save: ' + (err.message || 'error'), 'error');
    }
    closeModal();
    shareWithContactId = null;
    shareWithContactName = '';
    if (document.getElementById('contactsListContent') && !document.getElementById('contactsOverlay').classList.contains('hidden')) {
        await loadAndRenderContactList();
    }
}

// ============================================================
// PREFERENCES (profile)
// ============================================================
function openPreferences() {
    if (!currentUser) return;
    showModal('preferences');
}

// ============================================================
// UTILITIES
// ============================================================
function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

// ============================================================
// BOOT
// ============================================================
init();
</script>
